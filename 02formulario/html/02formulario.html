<!DOCTYPE html>
<html lang="en">
<head>

    <title>Formulario 02</title>
</head>
<body>
    <form action="https://nic.ifrn.edu.br/aulas/atividade_02/" method="post">
    <p>
        Nome:
        <input type="text" name="nome">
    </p>
    
    <p>Qual é a melhor disciplina?</p>

    <p>
        <input type="radio" name="resp_01"
        value="Português">Português<br>

        <input type="radio" name="resp_01"
        value="Matemática">Matemática<br>

        <input type="radio" name="resp_01"
        value="Autoria Web">Autoria Web<br>
    </p>

    
    <p>Como você avalia a disciplina selecionada?</p>

    <p>
        <input type="radio" name="resp_02"
        value="Excelente">Excelente<br>

        <input type="radio" name="resp_02"
        value="Boa">Boa<br>

        <input type="radio" name="resp_02"
        value="Ruim">Ruim<br>
    </p>

    <p>
        <input type="submit" value="Enviar">
    </p>

    </form>

</html>
